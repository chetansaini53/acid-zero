<svg viewBox="0 0 1000 900" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Segoe UI, Roboto, Arial, sans-serif">
<title>ESP32 38-pin all-in-one co-processor pinout — CC1101 + IR</title>
<desc>NodeMCU-32S (ESP32-D0WD-V3, 38-pin) wired as a single Sub-GHz/IR co-processor for Acid Zero. Board shown with the USB connector at the TOP (matching how the board is held: CLK is the top-left pin, 5V the top-right). CC1101 on GDO0=D4, CSN=D5, SCK=D18, MOSI=D19, MISO=D23 (matches committed firmware/esp32-cc1101). IR TX=D13, RX=D14 (matches committed firmware/esp32-ir). The ESP32 talks to the Raspberry Pi over its own USB cable (/dev/ttyUSB* or /dev/ttyACM*). GPS is NOT on this board - it wires to the Pi's own UART (GPIO14/15, /dev/serial0), see launcher/acid_gps.py. Flash pins CLK/SD0/SD1/SD2/SD3/CMD, strapping pins P0/P2/P15/P12, and USB0 RX/TX are reserved - never wire signals to them. GPIO34/35/36(SVP)/39(SVN) are input-only.</desc>
<rect x="0" y="0" width="1000" height="900" rx="14" fill="#0e1525"/>
<text x="500" y="38" text-anchor="middle" fill="#e8eef7" font-size="24" font-weight="700">ESP32 38-pin — All-in-One CC1101 + IR Co-Processor</text>
<text x="500" y="60" text-anchor="middle" fill="#8a97ab" font-size="13">Acid Zero · NodeMCU-32S (ESP32-D0WD-V3) · one board, one USB cable to the Pi · GPS is separate (Pi's own UART)</text>

