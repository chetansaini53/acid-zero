<text x="500" y="836" text-anchor="middle" fill="#8a97ab" font-size="12">CC1101 + IR pins match the already-committed firmware/esp32-cc1101 and firmware/esp32-ir sketches exactly — unchanged, now merged onto one board.</text>
<text x="500" y="856" text-anchor="middle" fill="#8a97ab" font-size="12">ESP32 ↔ Pi is a plain USB cable (power + serial). GPS is NOT here — wire it straight to the Pi's own GPIO14/15 UART instead (see acid_gps.py). GDO2 not connected.</text>
<text x="500" y="880" text-anchor="middle" fill="#5a6270" font-size="11">Board: ESP32-D0WD-V3 rev v3.1 · 4MB flash · MAC 88:f1:55:32:16:90 · flashed via COM6</text>
