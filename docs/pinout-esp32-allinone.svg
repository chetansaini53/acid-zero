<text x="500" y="356" text-anchor="middle" fill="#aab3c2" font-size="14" font-weight="600">ESP32</text>
<text x="500" y="374" text-anchor="middle" fill="#7c8696" font-size="11">D0WD-V3</text>
<text x="500" y="392" text-anchor="middle" fill="#5a6270" font-size="10">NodeMCU-32S · 38-pin</text>
<rect x="466" y="150" width="68" height="20" rx="3" fill="#9aa1ad"/>
<text x="500" y="164" text-anchor="middle" fill="#2a2e36" font-size="9" font-weight="700">USB → Pi</text>
<text x="500" y="186" text-anchor="middle" fill="#5a6270" font-size="9">(USB at top)</text>

