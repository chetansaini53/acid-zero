<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Segoe UI, Roboto, Arial, sans-serif">
<title>CC1101 8-pin module to ESP32 wiring map</title>
<desc>EGBO CC1101 433MHz 8-pin transceiver module mapped to the ESP32. Pin 1 GND to GND; pin 2 VCC to 3V3 (3.3V only); pin 3 GDO0 to GPIO4/D4 - this single pin carries the raw OOK data BOTH ways (RX capture and TX replay, async serial mode); pin 4 CSN to GPIO5/D5; pin 5 SCK to GPIO18/D18; pin 6 MOSI/SI to GPIO19/D19; pin 7 MISO/SO/GDO1 to GPIO23/D23; pin 8 GDO2 not connected (spare, not needed). MOSI to D19 and MISO to D23 look crossed but are correct - swapping them is the classic VER=0x00 failure. Matches firmware/esp32-cc1101 and firmware/esp32-allinone pin constants: SCK=18, MISO=23, MOSI=19, CS=5, GDO0=4.</desc>
<rect x="0" y="0" width="1000" height="640" rx="14" fill="#0e1525"/>
<text x="500" y="40" text-anchor="middle" fill="#e8eef7" font-size="24" font-weight="700">CC1101  →  ESP32 — Wiring Map (all 8 pins)</text>
<text x="500" y="64" text-anchor="middle" fill="#8a97ab" font-size="13">EGBO CC1101 433 MHz 8-pin module · matches firmware/esp32-cc1101 &amp; esp32-allinone · 7 wired, 1 spare</text>

<!-- column headers -->
<text x="86" y="104" fill="#7c8696" font-size="12" font-weight="700">CC1101 PIN</text>
<text x="456" y="104" fill="#7c8696" font-size="12" font-weight="700">ESP32 PIN</text>
<text x="600" y="104" fill="#7c8696" font-size="12" font-weight="700">PURPOSE</text>
<line x1="60" y1="112" x2="965" y2="112" stroke="#26303f" stroke-width="1"/>

<!-- row 1: GND -->
<rect x="60" y="129" width="16" height="16" rx="3" fill="#9aa4b2"/><text x="86" y="142" fill="#e8eef7" font-size="15" font-weight="600">1  GND</text>
<text x="360" y="142" fill="#8a97ab" font-size="16">→</text>
<rect x="430" y="129" width="16" height="16" rx="3" fill="#9aa4b2"/><text x="456" y="142" fill="#e8eef7" font-size="15" font-weight="600">GND</text>
<text x="600" y="142" fill="#aab3c2" font-size="13">ground — common with ESP32 GND</text>

<!-- row 2: VCC -->
<rect x="60" y="173" width="16" height="16" rx="3" fill="#ff5a5a"/><text x="86" y="186" fill="#e8eef7" font-size="15" font-weight="600">2  VCC</text>
<text x="360" y="186" fill="#8a97ab" font-size="16">→</text>
<rect x="430" y="173" width="16" height="16" rx="3" fill="#ff5a5a"/><text x="456" y="186" fill="#e8eef7" font-size="15" font-weight="600">3V3</text>
<text x="600" y="186" fill="#aab3c2" font-size="13">power — 3.3 V ONLY (never 5 V, it will die)</text>

<!-- row 3: GDO0 (the important one) -->
<rect x="52" y="205" width="900" height="40" rx="7" fill="#1a1508" stroke="#ffb02e" stroke-width="1"/>
<rect x="60" y="217" width="16" height="16" rx="3" fill="#ffb02e"/><text x="86" y="230" fill="#ffd98a" font-size="15" font-weight="700">3  GDO0</text>
<text x="360" y="230" fill="#8a97ab" font-size="16">→</text>
<rect x="430" y="217" width="16" height="16" rx="3" fill="#ffb02e"/><text x="456" y="230" fill="#ffd98a" font-size="15" font-weight="700">D4 (GPIO4)</text>
<text x="600" y="230" fill="#ffd98a" font-size="13" font-weight="600">raw OOK data — RX capture + TX replay (BOTH, one pin)</text>

<!-- row 4: CSN -->
<rect x="60" y="261" width="16" height="16" rx="3" fill="#45c46a"/><text x="86" y="274" fill="#e8eef7" font-size="15" font-weight="600">4  CSN</text>
<text x="360" y="274" fill="#8a97ab" font-size="16">→</text>
<rect x="430" y="261" width="16" height="16" rx="3" fill="#45c46a"/><text x="456" y="274" fill="#e8eef7" font-size="15" font-weight="600">D5 (GPIO5)</text>
<text x="600" y="274" fill="#aab3c2" font-size="13">SPI chip-select</text>

<!-- row 5: SCK -->
<rect x="60" y="305" width="16" height="16" rx="3" fill="#4aa3ff"/><text x="86" y="318" fill="#e8eef7" font-size="15" font-weight="600">5  SCK</text>
<text x="360" y="318" fill="#8a97ab" font-size="16">→</text>
<rect x="430" y="305" width="16" height="16" rx="3" fill="#4aa3ff"/><text x="456" y="318" fill="#e8eef7" font-size="15" font-weight="600">D18 (GPIO18)</text>
<text x="600" y="318" fill="#aab3c2" font-size="13">SPI clock</text>

<!-- row 6: MOSI -->
<rect x="60" y="349" width="16" height="16" rx="3" fill="#b06cff"/><text x="86" y="362" fill="#e8eef7" font-size="15" font-weight="600">6  MOSI</text>
<text x="360" y="362" fill="#8a97ab" font-size="16">→</text>
<rect x="430" y="349" width="16" height="16" rx="3" fill="#b06cff"/><text x="456" y="362" fill="#e8eef7" font-size="15" font-weight="600">D19 (GPIO19)</text>
<text x="600" y="362" fill="#aab3c2" font-size="13">SPI data ESP32 → CC1101 (SI)</text>

<!-- row 7: MISO / GDO1 -->
<rect x="60" y="393" width="16" height="16" rx="3" fill="#2ad0e0"/><text x="86" y="406" fill="#e8eef7" font-size="15" font-weight="600">7  MISO / GDO1</text>
<text x="360" y="406" fill="#8a97ab" font-size="16">→</text>
<rect x="430" y="393" width="16" height="16" rx="3" fill="#2ad0e0"/><text x="456" y="406" fill="#e8eef7" font-size="15" font-weight="600">D23 (GPIO23)</text>
<text x="600" y="406" fill="#aab3c2" font-size="13">SPI data CC1101 → ESP32 (SO)</text>

<!-- row 8: GDO2 -->
<rect x="60" y="437" width="16" height="16" rx="3" fill="#5a6270"/><text x="86" y="450" fill="#8a97ab" font-size="15" font-weight="600">8  GDO2</text>
<text x="360" y="450" fill="#5a6270" font-size="16">✕</text>
<rect x="430" y="437" width="16" height="16" rx="3" fill="#3a3f49"/><text x="456" y="450" fill="#8a97ab" font-size="15" font-weight="600">— (n/c)</text>
<text x="600" y="450" fill="#8a97ab" font-size="13">not connected — spare, NOT needed (GDO0 does both)</text>

<!-- explanation box -->
<rect x="52" y="474" width="900" height="86" rx="8" fill="#12203a" stroke="#2f4a72" stroke-width="1"/>
<text x="70" y="496" fill="#cfe0ff" font-size="13" font-weight="700">Why is GDO0 enough for BOTH TX and RX (and GDO2 stays free)?</text>
<text x="70" y="516" fill="#aab3c2" font-size="12.5">In CC1101 asynchronous serial mode, GDO0 is a bidirectional raw-data line. During RX the CC1101 drives GDO0 with</text>
<text x="70" y="533" fill="#aab3c2" font-size="12.5">demodulated data and the ESP32 reads it (rmtRead); during TX the ESP32 drives GDO0 and the CC1101 transmits it</text>
<text x="70" y="550" fill="#aab3c2" font-size="12.5">(digitalWrite). Same pin, both directions — your firmware already captures AND replays through GDO0. That's the design.</text>

<!-- warnings -->
<text x="60" y="588" fill="#ffb02e" font-size="12.5" font-weight="600">⚠ MOSI→D19 and MISO→D23 look "crossed" but are CORRECT — swapping them is the classic "VER reads 0x00" failure.</text>
<text x="60" y="610" fill="#8a97ab" font-size="12">All 8 pins accounted for: 7 wired (GND, VCC, GDO0, CSN, SCK, MOSI, MISO/GDO1) + 1 spare (GDO2). 3.3 V power only.</text>
<text x="60" y="630" fill="#5a6270" font-size="11">Matches firmware/esp32-cc1101 + esp32-allinone constants: SCK=18 · MISO=23 · MOSI=19 · CS=5 · GDO0=4.  IR &amp; GPS are separate (already mapped).</text>
</svg>
