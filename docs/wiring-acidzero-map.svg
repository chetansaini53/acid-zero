<!-- ================= GPS -> Raspberry Pi card ================= -->
<rect x="640" y="904" width="520" height="284" rx="10" fill="#12223f" stroke="#2f5aa0" stroke-width="1.5"/>
<text x="660" y="934" fill="#cfe0ff" font-size="16" font-weight="700">GPS  (5-pin)  →  RASPBERRY PI</text>
<text x="660" y="954" fill="#7fa0d8" font-size="12">not the ESP32 — GPS streams NMEA the Pi reads directly (acid_gps.py)</text>
<line x1="656" y1="966" x2="1144" y2="966" stroke="#25406a"/>
<g font-size="14">
<rect x="660" y="982" width="15" height="15" rx="3" fill="#ff5a5a"/><text x="686" y="995" fill="#e8eef7" font-weight="600">VCC</text><text x="880" y="995" fill="#7fa0d8">→</text><text x="910" y="995" fill="#e8eef7" font-weight="600">Pi 3V3 (pin 1)</text><text x="1070" y="995" fill="#7fa0d8" font-size="12">3.3 V-safe</text>
<rect x="660" y="1014" width="15" height="15" rx="3" fill="#9aa4b2"/><text x="686" y="1027" fill="#e8eef7" font-weight="600">GND</text><text x="880" y="1027" fill="#7fa0d8">→</text><text x="910" y="1027" fill="#e8eef7" font-weight="600">Pi GND (pin 6)</text><text x="1070" y="1027" fill="#7fa0d8" font-size="12">ground</text>
<rect x="660" y="1046" width="15" height="15" rx="3" fill="#6cb0ff"/><text x="686" y="1059" fill="#e8eef7" font-weight="600">TXD</text><text x="880" y="1059" fill="#7fa0d8">→</text><text x="910" y="1059" fill="#e8eef7" font-weight="600">Pi RXD · GPIO15 (pin 10)</text><text x="880" y="1076" fill="#ffb02e" font-size="11" font-weight="600">⤷ crossover: GPS TX → Pi RX</text>
<rect x="660" y="1090" width="15" height="15" rx="3" fill="#6cb0ff"/><text x="686" y="1103" fill="#e8eef7" font-weight="600">RXD</text><text x="880" y="1103" fill="#7fa0d8">→</text><text x="910" y="1103" fill="#e8eef7" font-weight="600">Pi TXD · GPIO14 (pin 8)</text><text x="880" y="1120" fill="#ffb02e" font-size="11" font-weight="600">⤷ crossover: GPS RX → Pi TX</text>
<rect x="660" y="1134" width="15" height="15" rx="3" fill="#5a6270"/><text x="686" y="1147" fill="#8a97ab" font-weight="600">PPS</text><text x="880" y="1147" fill="#7fa0d8">→</text><text x="910" y="1147" fill="#8a97ab" font-weight="600">Pi GPIO (optional)</text><text x="1070" y="1147" fill="#7fa0d8" font-size="12">time sync</text>
</g>
<text x="660" y="1176" fill="#7fa0d8" font-size="11">On the Pi: enable_uart=1, disable the serial login console, and free the PL011 (dtoverlay=disable-bt) for stable 9600-baud NMEA.</text>

<!-- ================= safety notes ================= -->
<text x="40" y="1226" fill="#e8eef7" font-size="15" font-weight="700">⚠ Verified safety notes (raised by the review — read before wiring)</text>
<g font-size="12.5" fill="#aab3c2">
<text x="40" y="1252">1.  CC1101 is <tspan fill="#ff9a9a" font-weight="700">3.3 V ONLY</tspan> — VCC, all SPI lines and GDO0 must stay at 3.3 V. Any 5 V on the module destroys the radio.</text>
<text x="40" y="1274">2.  <tspan fill="#ffb02e" font-weight="700">MOSI→P19 and MISO→P23 are firmware-swapped</tspan> vs the default VSPI silk (native MOSI=23/MISO=19). Wire per firmware or every read returns 0x00.</text>
<text x="40" y="1296">3.  GDO0 (P4) is a <tspan fill="#ffd98a" font-weight="700">single bidirectional data line</tspan> — RX capture and TX replay both go through it. GDO2 is unused (leave open, don't tie to a rail).</text>
<text x="40" y="1318">4.  GPIO5 (CSN) is a boot strapping pin (idles HIGH, fine) — never add an external pulldown on it. GPIO13/14 disable JTAG (acceptable).</text>
<text x="40" y="1340">5.  GPS: power at <tspan fill="#6cb0ff" font-weight="700">3.3 V</tspan> so its TXD stays 3.3 V — the Pi's GPIO15 (RX) is NOT 5 V-tolerant. If your module must run at 5 V, add a level shifter on GPS-TXD.</text>
<text x="40" y="1362">6.  IR RX pin "A" is unidentified — <tspan fill="#ffb02e" font-weight="700">leave n/c</tspan> until confirmed. IR TX direct off GPIO13 = weak range; add a transistor driver (module VCC 5 V, gate stays 3.3 V) for distance.</text>
<text x="40" y="1384">7.  If the ESP32 and Pi run on separate supplies, <tspan fill="#e8eef7" font-weight="600">tie their grounds together</tspan> so the logic levels share a reference.</text>
</g>
<text x="40" y="1416" fill="#5a6270" font-size="11">Signal pins locked to firmware/esp32-allinone: SCK=18 · MISO=23 · MOSI=19 · CS=5 · GDO0=4 · IR TX=13 · IR RX=14.  Independently verified 3/3 agents.</text>
</svg>
