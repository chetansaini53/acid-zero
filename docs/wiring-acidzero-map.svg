<svg viewBox="0 0 1200 1440" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Segoe UI, Roboto, Arial, sans-serif">
<title>Acid Zero full wiring map — ESP32 (CC1101 + IR) and Raspberry Pi (GPS)</title>
<desc>Complete wiring map for Acid Zero. ESP32 38-pin board shown exactly as the user's board (USB at bottom). CC1101 8-pin module to ESP32: GND-GND, VCC-3V3, GDO0-P4/GPIO4, CSN-P5/GPIO5, SCK-P18/GPIO18, MOSI-P19/GPIO19, MISO/GDO1-P23/GPIO23, GDO2 n/c. IR TX 3-pin: S-P13/GPIO13, VCC-3V3, GND-GND. IR RX 4-pin (G V S A): G-GND, V-3V3, S-P14/GPIO14, A n/c. GPS 5-pin goes to the RASPBERRY PI UART (not the ESP32): VCC-Pi 3V3, GND-Pi GND, TXD-Pi RXD/GPIO15 pin10, RXD-Pi TXD/GPIO14 pin8, PPS optional. MOSI-P19 and MISO-P23 are firmware-swapped versus the default VSPI silk - wire per firmware or reads return 0x00. CC1101 is 3.3V only. GDO0 is bidirectional (RX capture + TX replay). Independently verified 3/3 agents.</desc>
<rect x="0" y="0" width="1200" height="1440" rx="14" fill="#0e1525"/>

<!-- header -->
<text x="600" y="42" text-anchor="middle" fill="#e8eef7" font-size="26" font-weight="700">Acid Zero — Full Wiring Map</text>
<text x="600" y="68" text-anchor="middle" fill="#8a97ab" font-size="13">ESP32 co-processor (CC1101 + IR)  ·  Raspberry Pi (GPS)  ·  pins match firmware exactly</text>
<rect x="470" y="82" width="260" height="22" rx="11" fill="#14311f" stroke="#2f7a4a" stroke-width="1"/>
<text x="600" y="97" text-anchor="middle" fill="#7fe0a8" font-size="11" font-weight="700">✓ independently verified — 3/3 agents, all fields matched</text>

