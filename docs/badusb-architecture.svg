<svg viewBox="0 0 1080 710" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Segoe UI, Roboto, Arial, sans-serif">
<title>Acid Zero Bad USB — how the Pico 2 W connects to the Pi (AP mode)</title>
<desc>The Raspberry Pi Pico 2 W hosts its own Wi-Fi access point (AcidZero-Duck, WPA2, 192.168.4.1) and a DuckyScript HID server on port 1337. The Raspberry Pi joins that AP on a dedicated adapter (wlan2) with a static IP and no default route, so its main uplink (wlan1) keeps SSH and internet. The Pi sends Flipper-compatible DuckyScript over TCP; the Pico types it into the target it is plugged into over USB HID. Self-contained: needs no external Wi-Fi, works anywhere.</desc>

<defs>
  <marker id="ag" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#7ee07e"/></marker>
  <marker id="ab" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#4aa3ff"/></marker>
  <marker id="ao" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto"><path d="M0,0 L9,3.5 L0,7 Z" fill="#ff8a3d"/></marker>
</defs>

<rect x="0" y="0" width="1080" height="710" rx="14" fill="#0e1525"/>
<text x="540" y="40" text-anchor="middle" fill="#e8eef7" font-size="25" font-weight="700">Bad USB — how the Pico connects to the Pi</text>
<text x="540" y="65" text-anchor="middle" fill="#8a97ab" font-size="14">The Pico hosts its OWN Wi-Fi AP · the Pi joins it on a dedicated adapter · self-contained, works anywhere, SSH stays up</text>

<!-- ===== Home / field Wi-Fi router ===== -->
<rect x="330" y="86" width="252" height="58" rx="8" fill="#2a2e36" stroke="#454b57"/>
<text x="456" y="110" text-anchor="middle" fill="#aab3c2" font-size="13" font-weight="700">Home / field Wi-Fi · internet</text>
<text x="456" y="130" text-anchor="middle" fill="#7c8696" font-size="11">192.168.1.1 · any network (or none in the field)</text>

<!-- ===== Raspberry Pi ===== -->
<rect x="60" y="172" width="452" height="462" rx="12" fill="#15171c" stroke="#a23b3b" stroke-width="2"/>
<text x="270" y="196" text-anchor="middle" fill="#ff7a7a" font-size="16" font-weight="700">Raspberry Pi 3B+ — Acid Zero (the brain)</text>

<!-- wlan1 (uplink) -->
<rect x="80" y="212" width="412" height="64" rx="8" fill="#2a2e36" stroke="#454b57"/>
<text x="286" y="234" text-anchor="middle" fill="#aab3c2" font-size="13" font-weight="700">wlan1 · RTL8821AU  →  HOME Wi-Fi</text>
<text x="286" y="252" text-anchor="middle" fill="#7c8696" font-size="11">SSH + internet · DEFAULT ROUTE</text>
<text x="286" y="268" text-anchor="middle" fill="#7ee07e" font-size="11" font-weight="600">untouched by Bad USB — never drops</text>

<rect x="80" y="286" width="412" height="58" rx="8" fill="#1b2230" stroke="#2a3550"/>
<text x="286" y="307" text-anchor="middle" fill="#cfe0ff" font-size="13" font-weight="700">Bad USB app · apps/badusb.py</text>
<text x="286" y="326" text-anchor="middle" fill="#8a97ab" font-size="11">CONNECT · DISCONNECT · folder browser · RUN · (i) Learn</text>

<rect x="80" y="354" width="412" height="58" rx="8" fill="#1b2230" stroke="#2a3550"/>
<text x="286" y="375" text-anchor="middle" fill="#cfe0ff" font-size="13" font-weight="700">acid_badusb.py · link manager + client</text>
<text x="286" y="394" text-anchor="middle" fill="#8a97ab" font-size="11">nmcli join / leave the AP · TCP DuckyScript client</text>

<!-- wlan2 (dedicated worker, highlighted) -->
<rect x="80" y="422" width="412" height="82" rx="8" fill="#16241c" stroke="#3f7d5a" stroke-width="1.5"/>
<text x="286" y="446" text-anchor="middle" fill="#7ee07e" font-size="13" font-weight="700">wlan2 · RTL8188EUS  →  dedicated Bad USB link</text>
<text x="286" y="466" text-anchor="middle" fill="#9fd0c0" font-size="11">static 192.168.4.2/24 · joins the Pico's AP on CONNECT</text>
<text x="286" y="484" text-anchor="middle" fill="#9fd0c0" font-size="11">never-default → no internet / SSH hijack</text>

<text x="286" y="544" text-anchor="middle" fill="#7c8696" font-size="11" font-style="italic">one adapter for the world, one just for the Pico</text>
<text x="286" y="596" text-anchor="middle" fill="#8a97ab" font-size="12">Also drives: TFT UI · touch · Sub-GHz / IR ESP32 · GPS</text>

<!-- ===== Pico 2 W ===== -->
<rect x="640" y="172" width="380" height="300" rx="12" fill="#15171c" stroke="#3ba7a0" stroke-width="2"/>
<text x="830" y="196" text-anchor="middle" fill="#7fe0d6" font-size="16" font-weight="700">Raspberry Pi Pico 2 W — co-processor</text>

<rect x="660" y="212" width="340" height="52" rx="8" fill="#1b2230" stroke="#2a3550"/>
<text x="830" y="233" text-anchor="middle" fill="#cfe0ff" font-size="13" font-weight="700">code.py · CircuitPython</text>
<text x="830" y="251" text-anchor="middle" fill="#8a97ab" font-size="11">AP + DuckyScript engine · retries flaky first start</text>

<rect x="660" y="274" width="340" height="66" rx="8" fill="#16241c" stroke="#3f7d5a" stroke-width="1.5"/>
<text x="830" y="297" text-anchor="middle" fill="#7ee07e" font-size="13" font-weight="700">Wi-Fi AP: AcidZero-Duck (WPA2)</text>
<text x="830" y="317" text-anchor="middle" fill="#9fd0c0" font-size="11">gateway 192.168.4.1 · DHCP server</text>
<text x="830" y="333" text-anchor="middle" fill="#9fd0c0" font-size="11">no external Wi-Fi needed — hosts its own</text>

<rect x="660" y="350" width="340" height="52" rx="8" fill="#1b2230" stroke="#2a3550"/>
<text x="830" y="371" text-anchor="middle" fill="#cfe0ff" font-size="13" font-weight="700">Bad USB server · TCP :1337</text>
<text x="830" y="389" text-anchor="middle" fill="#8a97ab" font-size="11">parses Flipper DuckyScript → keystrokes</text>

<rect x="660" y="412" width="340" height="46" rx="8" fill="#2a2e36" stroke="#454b57"/>
<text x="830" y="433" text-anchor="middle" fill="#ffce9a" font-size="13" font-weight="700">USB HID keyboard  →  the TARGET</text>
<text x="830" y="449" text-anchor="middle" fill="#7c8696" font-size="10">enumerates as a plain keyboard</text>

<!-- ===== Target ===== -->
<rect x="640" y="508" width="380" height="96" rx="12" fill="#221f2b" stroke="#6a5a8a" stroke-width="2"/>
<text x="830" y="536" text-anchor="middle" fill="#c9b8e6" font-size="15" font-weight="700">TARGET machine</text>
<text x="830" y="560" text-anchor="middle" fill="#9a8cb8" font-size="12">your own / explicitly authorized only</text>
<text x="830" y="584" text-anchor="middle" fill="#8a97ab" font-size="11">the Pico is plugged in here · keystrokes land here</text>

<!-- ===== Arrows ===== -->
<!-- wlan1 -> home router : short, clear of the header text -->
<path d="M456,212 L456,146" fill="none" stroke="#4aa3ff" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ab)"/>

<!-- wlan2 -> Pico AP : the Bad USB link -->
<path d="M492,463 L640,307" fill="none" stroke="#7ee07e" stroke-width="3" marker-end="url(#ag)"/>
<rect x="513" y="350" width="116" height="62" rx="7" fill="#0e1525" stroke="#3f7d5a"/>
<text x="571" y="370" text-anchor="middle" fill="#7ee07e" font-size="11" font-weight="700">Wi-Fi link</text>
<text x="571" y="386" text-anchor="middle" fill="#9fd0c0" font-size="9.5">DuckyScript / TCP</text>
<text x="571" y="399" text-anchor="middle" fill="#9fd0c0" font-size="9.5">.4.2 → .4.1:1337</text>

<!-- Pico USB -> Target -->
<path d="M830,458 L830,508" fill="none" stroke="#ff8a3d" stroke-width="3" marker-end="url(#ao)"/>
<rect x="852" y="470" width="158" height="30" rx="5" fill="#0e1525"/>
<text x="931" y="489" text-anchor="middle" fill="#ffb27a" font-size="10.5">USB · injected keystrokes</text>

<!-- ===== CONNECT flow strip ===== -->
<rect x="60" y="652" width="960" height="42" rx="8" fill="#12203a" stroke="#2a3550"/>
<text x="76" y="678" fill="#7ee07e" font-size="12" font-weight="700">CONNECT flow:</text>
<text x="178" y="678" fill="#cfe0ff" font-size="11.5">1  tap CONNECT   →   2  wlan2 scans for AcidZero-Duck   →   3  nmcli joins (static 192.168.4.2)   →   4  reach 192.168.4.1:1337 = PONG / ONLINE   →   5  RUN → keystrokes</text>
</svg>
