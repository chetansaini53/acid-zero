<svg viewBox="0 0 1040 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Segoe UI, Roboto, Arial, sans-serif">
<title>Acid Zero architecture — Pi client to CC1101 + IR over one ESP32 co-processor</title>
<desc>Raspberry Pi Python launcher (framebuffer UI) talks over USB serial to a single ESP32 co-processor, which drives BOTH a CC1101 sub-GHz transceiver over SPI and an IR transmitter/receiver over GPIO. The Pi also reads a USB u-blox GPS directly. RF goes out an SMA antenna; IR out a 38 kHz LED.</desc>
<rect x="0" y="0" width="1040" height="620" rx="14" fill="#0e1525"/>
<text x="520" y="40" text-anchor="middle" fill="#e8eef7" font-size="25" font-weight="700">Acid Zero — System Architecture</text>
<text x="520" y="64" text-anchor="middle" fill="#8a97ab" font-size="14">UI brain on the Pi · one ESP32 co-processor drives BOTH CC1101 (Sub-GHz) and IR (the Flipper pattern)</text>

<!-- ============ Raspberry Pi ============ -->
<rect x="40" y="92" width="300" height="430" rx="12" fill="#15171c" stroke="#a23b3b" stroke-width="2"/>
<text x="190" y="116" text-anchor="middle" fill="#ff7a7a" font-size="16" font-weight="700">Raspberry Pi 3B+  (the brain / UI)</text>

<rect x="60" y="130" width="260" height="64" rx="8" fill="#1b2230" stroke="#2a3550"/>
<text x="190" y="150" text-anchor="middle" fill="#e8eef7" font-size="13" font-weight="700">Launcher  (Python, ~1500 LOC)</text>
<text x="190" y="168" text-anchor="middle" fill="#8a97ab" font-size="11">framebuffer UI · screen state machine</text>
<text x="190" y="184" text-anchor="middle" fill="#8a97ab" font-size="11">dirty-flag render · evdev touch</text>

<rect x="60" y="202" width="260" height="58" rx="8" fill="#1b2230" stroke="#2a3550"/>
<text x="190" y="221" text-anchor="middle" fill="#cfe0ff" font-size="13" font-weight="700">Sub-GHz + IR plugins</text>
<text x="190" y="238" text-anchor="middle" fill="#8a97ab" font-size="11">subghz.py · ir.py (Flipper remotes)</text>
<text x="190" y="252" text-anchor="middle" fill="#8a97ab" font-size="11">Analyze · Record · Replay · Saved</text>

<rect x="60" y="268" width="260" height="52" rx="8" fill="#1b2230" stroke="#2a3550"/>
<text x="190" y="286" text-anchor="middle" fill="#cfe0ff" font-size="13" font-weight="700">serial clients (pyserial)</text>
<text x="190" y="303" text-anchor="middle" fill="#8a97ab" font-size="11">acid_subghz.py · acid_ir.py · acid_gps.py</text>

<rect x="60" y="328" width="260" height="48" rx="8" fill="#2a2e36" stroke="#454b57"/>
<text x="190" y="348" text-anchor="middle" fill="#aab3c2" font-size="12" font-weight="600">3.5" ILI9486 TFT  (SPI, /dev/fb0)</text>
<text x="190" y="364" text-anchor="middle" fill="#7c8696" font-size="10">+ resistive touch · sole framebuffer owner</text>

<rect x="60" y="384" width="260" height="46" rx="8" fill="#2a2e36" stroke="#454b57"/>
<text x="190" y="403" text-anchor="middle" fill="#aab3c2" font-size="12" font-weight="600">USB Wi-Fi ×N + onboard BLE</text>
<text x="190" y="419" text-anchor="middle" fill="#7c8696" font-size="10">bound by USB VID:PID</text>

<rect x="60" y="438" width="260" height="46" rx="8" fill="#14223a" stroke="#2f5aa0"/>
<text x="190" y="457" text-anchor="middle" fill="#9fc0ff" font-size="12" font-weight="600">GPS — u-blox 7 (USB, /dev/ttyACM0)</text>
<text x="190" y="473" text-anchor="middle" fill="#7c8696" font-size="10">NMEA → acid_gps.py (wardrive tags)</text>

<text x="190" y="502" text-anchor="middle" fill="#7c8696" font-size="11">base OS: jayofelony pwnagotchi</text>

<!-- ============ ESP32 (one board, both radios) ============ -->
<rect x="430" y="150" width="270" height="300" rx="12" fill="#16181d" stroke="#3b7a3b" stroke-width="2"/>
<text x="565" y="174" text-anchor="middle" fill="#7ee07e" font-size="16" font-weight="700">ESP32-WROOM-32</text>
<text x="565" y="192" text-anchor="middle" fill="#8a97ab" font-size="11">one co-processor — RF + IR brain</text>
<rect x="450" y="204" width="230" height="76" rx="8" fill="#1b2230" stroke="#2a3550"/>
<text x="565" y="224" text-anchor="middle" fill="#cfe0ff" font-size="12" font-weight="700">firmware (Arduino, merged)</text>
<text x="565" y="241" text-anchor="middle" fill="#8a97ab" font-size="11">CC1101 driver (ELECHOUSE)</text>
<text x="565" y="256" text-anchor="middle" fill="#8a97ab" font-size="11">+ IR (IRremoteESP8266)</text>
<text x="565" y="271" text-anchor="middle" fill="#8a97ab" font-size="11">one serial parser · prefix-routed cmds</text>
<rect x="450" y="288" width="230" height="44" rx="8" fill="#2a2e36" stroke="#454b57"/>
<text x="565" y="308" text-anchor="middle" fill="#aab3c2" font-size="11" font-weight="600">RMT peripheral = hw-precise timing</text>
<text x="565" y="323" text-anchor="middle" fill="#7c8696" font-size="10">raw OOK capture + IR carrier</text>
<text x="565" y="360" text-anchor="middle" fill="#7c8696" font-size="11">dual-core · USB-CDC to the Pi</text>
<text x="565" y="392" text-anchor="middle" fill="#7c8696" font-size="10">CC1101: GDO0 D4 · CSN D5 · SCK D18</text>
<text x="565" y="407" text-anchor="middle" fill="#7c8696" font-size="10">MOSI D19 · MISO D23   |   IR: TX D13 · RX D14</text>
<text x="565" y="430" text-anchor="middle" fill="#5a7a5a" font-size="10">full pin map → docs/pinout-esp32-allinone.svg</text>

<!-- ============ CC1101 ============ -->
<rect x="790" y="110" width="210" height="170" rx="12" fill="#14305f" stroke="#2f5aa0" stroke-width="2"/>
<text x="895" y="136" text-anchor="middle" fill="#cfe0ff" font-size="15" font-weight="700">CC1101</text>
<text x="895" y="154" text-anchor="middle" fill="#7fa0d8" font-size="11">sub-GHz transceiver</text>
<text x="895" y="176" text-anchor="middle" fill="#8a97ab" font-size="11">300–928 MHz</text>
<text x="895" y="192" text-anchor="middle" fill="#8a97ab" font-size="11">ASK/OOK · 2-FSK</text>
<circle cx="895" cy="230" r="15" fill="none" stroke="#d4af37" stroke-width="3"/>
<line x1="895" y1="245" x2="895" y2="266" stroke="#d4af37" stroke-width="4"/>
<text x="895" y="262" text-anchor="middle" fill="#9a8a40" font-size="10">SMA</text>

<!-- ============ IR ============ -->
<rect x="790" y="316" width="210" height="150" rx="12" fill="#3a2410" stroke="#a06a2a" stroke-width="2"/>
<text x="895" y="342" text-anchor="middle" fill="#ffce9a" font-size="15" font-weight="700">IR  TX / RX</text>
<text x="895" y="360" text-anchor="middle" fill="#d8a878" font-size="11">IRremoteESP8266</text>
<text x="895" y="382" text-anchor="middle" fill="#8a97ab" font-size="11">TX: LED driver (GPIO13)</text>
<text x="895" y="398" text-anchor="middle" fill="#8a97ab" font-size="11">RX: TSOP demod (GPIO14)</text>
<text x="895" y="420" text-anchor="middle" fill="#8a97ab" font-size="11">capture + raw replay (AC too)</text>
<line x1="875" y1="440" x2="915" y2="440" stroke="#ff8a3d" stroke-width="3"/>
<text x="895" y="458" text-anchor="middle" fill="#e08a55" font-size="10">38 kHz beam</text>

