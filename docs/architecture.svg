<!-- ============ flow strip ============ -->
<rect x="40" y="536" width="960" height="52" rx="8" fill="#11202b"/>
<text x="520" y="558" text-anchor="middle" fill="#9fd0c0" font-size="13" font-weight="700">Pi launcher (Python)  →  USB serial @115200  →  ESP32 firmware (one board)</text>
<text x="520" y="578" text-anchor="middle" fill="#9fd0c0" font-size="13" font-weight="700">├─ SPI + GDO0 → CC1101 → RF antenna       └─ GPIO13/14 → IR LED / TSOP → 38 kHz beam</text>
